name: AI Auto Blog (ZhipuAI)

on:
  schedule:
    - cron: "0 3 * * *"  # 每天 UTC+3（北京时间上午11点）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 👇 核心新增步骤：安装依赖模块   
      # 安装zhipuai（会自动带sniffio依赖）
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install zhipuai
          pip install sniffio

      - name: Generate Blog + XHS
        env:
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          python ai_generate_blog.py
          python fetch_daily_report.py
          python generate_rss.py

      - name: Commit & Push
        run: |
          git config user.name "wuxw2569"
          git config user.email "63176347@qq.com"
          git add .
          git diff --cached --quiet || git commit -m "🤖 智谱AI自动生成博文与小红书笔记"
          git push
